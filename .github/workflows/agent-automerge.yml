name: Agent Auto-merge (Reusable)

# Called by a project's agent-dispatch.yml on: pull_request_review (approved).
# OPT-IN: only merges PRs that carry the auto-merge label. The human-review gate
# is the default — unlabeled PRs are never auto-merged, they wait at agent-review.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      auto_merge_label:
        description: Label that opts a PR into auto-merge
        required: false
        type: string
        default: "auto-merge"
      merge_method:
        description: "squash | merge | rebase"
        required: false
        type: string
        default: "squash"

jobs:
  auto-merge:
    # Lightweight gh-only job — no agent, no self-hosted runner needed.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge if opted-in and approved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          LABEL: ${{ inputs.auto_merge_label }}
          METHOD: ${{ inputs.merge_method }}
        run: |
          set -euo pipefail

          case "$METHOD" in
            squash|merge|rebase) ;;
            *) echo "invalid merge_method '$METHOD' (want squash|merge|rebase)"; exit 1 ;;
          esac

          # Idempotent: approvals can arrive more than once, and a PR may already
          # be merged/closed by the time this runs.
          STATE=$(gh pr view "$PR" --repo "$REPO" --json state -q .state)
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR is $STATE — nothing to do."
            exit 0
          fi

          # Opt-in gate: only merge PRs that explicitly carry the label. Fetch via the
          # REST API, capture, then match in-shell (avoids any pipe/pipefail surprises)
          # and log what we found.
          LABELS=$(gh api "repos/$REPO/issues/$PR/labels" --jq '.[].name' 2>/dev/null || true)
          echo "auto-merge: looking for '$LABEL' among labels: [$(printf '%s' "$LABELS" | tr '\n' ' ')]"
          case $'\n'"$LABELS"$'\n' in
            *$'\n'"$LABEL"$'\n'*) : ;;
            *) echo "PR #$PR not labeled '$LABEL' — leaving it for manual review."; exit 0 ;;
          esac

          # The review-approved event is the gate (the caller's if: enforces it).
          # No branch protection on free private repos, so merge directly.
          echo "PR #$PR approved and labeled '$LABEL' — merging (--$METHOD)."
          # Issues this PR is set to close (Closes/Fixes/Resolves); 'Part of #N' is excluded.
          CLOSES=$(gh pr view "$PR" --repo "$REPO" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' 2>/dev/null || true)
          gh pr merge "$PR" --repo "$REPO" --"$METHOD" --delete-branch
          gh pr comment "$PR" --repo "$REPO" \
            --body "Auto-merged after approval (opt-in label \`$LABEL\`)." || true
          # GITHUB_TOKEN merges don't trigger GitHub's auto-close — close them ourselves.
          for iss in $CLOSES; do
            echo "closing issue #$iss (resolved by PR #$PR)"
            gh issue close "$iss" --repo "$REPO" --reason completed \
              --comment "Resolved by merged PR #$PR." || true
          done
