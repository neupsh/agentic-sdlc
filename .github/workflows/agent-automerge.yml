name: Agent Auto-merge (Reusable)

# Called by a project's agent-dispatch.yml on: pull_request_review (approved).
# OPT-IN: only merges PRs that carry the auto-merge label. The human-review gate
# is the default — unlabeled PRs are never auto-merged, they wait at agent-review.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      auto_merge_label:
        description: Label that opts a PR into auto-merge
        required: false
        type: string
        default: "auto-merge"
      merge_method:
        description: "squash | merge | rebase"
        required: false
        type: string
        default: "squash"

jobs:
  auto-merge:
    # Lightweight gh-only job — no agent, no self-hosted runner needed.
    runs-on: ubuntu-latest
    # No `permissions:` block here ON PURPOSE: a reusable workflow that DECLARES more
    # permissions than its caller grants is a startup_failure that poisons the whole
    # caller dispatcher for every event. This reusable inherits the caller auto-merge
    # job's permissions instead (like agent-issue/agent-revise do). The caller must
    # grant contents+pull-requests:write to merge, and issues:write to close linked
    # issues (install-dispatcher.sh grants all three; older dispatchers granting only
    # contents+pull-requests still merge — the issue-close just no-ops via `|| true`).
    env:
      # NB: no GH_TOKEN here — `secrets` is not available in job-level env: (GitHub
      # rejects the workflow at startup). The merge step sets its own GH_TOKEN.
      REPO: ${{ github.repository }}
      PR: ${{ inputs.pr_number }}
      LABEL: ${{ inputs.auto_merge_label }}
      METHOD: ${{ inputs.merge_method }}
    steps:
      # Optional branded bot identity — see agent-issue.yml for the full rationale.
      # With an App, the merge/comments/close are attributed to YOUR app and
      # GitHub's native linked-issue close may fire too; the explicit close below
      # is kept (state-guarded) so behavior is identical with or without the app.
      - name: Detect GitHub App credentials
        id: appdetect
        env:
          APP_ID: ${{ secrets.ADLC_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "adlc: GitHub App configured — merge/comments attributed to the app[bot]"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "adlc: no GitHub App secrets — using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Mint GitHub App token
        id: apptoken
        if: steps.appdetect.outputs.present == 'true'
        # A mint failure (e.g. app registered but not INSTALLED on this repo → 404)
        # must NOT kill the run — "Resolve auth token" falls back to GITHUB_TOKEN.
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADLC_APP_ID }}
          private-key: ${{ secrets.ADLC_APP_PRIVATE_KEY }}

      - name: Resolve auth token
        # Sets GH_TOKEN (app token else GITHUB_TOKEN) via $GITHUB_ENV. Each value is
        # its own single-context expression — a steps+secrets mix in one ${{ }} is a
        # startup_failure actionlint won't catch. See agent-issue.yml.
        env:
          PRESENT: ${{ steps.appdetect.outputs.present }}
          APP_TOKEN: ${{ steps.apptoken.outputs.token }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            printf 'GH_TOKEN=%s\n' "$APP_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GitHub App token"
          else
            if [ "$PRESENT" = "true" ]; then
              echo "::warning::adlc: App secrets are set but token minting failed — is the app INSTALLED on this repo? Falling back to GITHUB_TOKEN."
            fi
            printf 'GH_TOKEN=%s\n' "$DEFAULT_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Merge if opted-in and approved
        run: |
          set -euo pipefail

          case "$METHOD" in
            squash|merge|rebase) ;;
            *) echo "invalid merge_method '$METHOD' (want squash|merge|rebase)"; exit 1 ;;
          esac

          # Idempotent: approvals can arrive more than once, and a PR may already
          # be merged/closed by the time this runs.
          STATE=$(gh pr view "$PR" --repo "$REPO" --json state -q .state)
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR is $STATE — nothing to do."
            exit 0
          fi

          # Opt-in gate: only merge PRs that explicitly carry the label. Fetch via the
          # REST API, capture, then match in-shell (avoids any pipe/pipefail surprises)
          # and log what we found.
          LABELS=$(gh api "repos/$REPO/issues/$PR/labels" --jq '.[].name' 2>/dev/null || true)
          echo "auto-merge: looking for '$LABEL' among labels: [$(printf '%s' "$LABELS" | tr '\n' ' ')]"
          case $'\n'"$LABELS"$'\n' in
            *$'\n'"$LABEL"$'\n'*) : ;;
            *) echo "PR #$PR not labeled '$LABEL' — leaving it for manual review."; exit 0 ;;
          esac

          # The review-approved event is the gate (the caller's if: enforces it).
          # No branch protection on free private repos, so merge directly.
          echo "PR #$PR approved and labeled '$LABEL' — merging (--$METHOD)."
          # Issues this PR is set to close (Closes/Fixes/Resolves); 'Part of #N' is excluded.
          CLOSES=$(gh pr view "$PR" --repo "$REPO" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' 2>/dev/null || true)
          gh pr merge "$PR" --repo "$REPO" --"$METHOD" --delete-branch
          gh pr comment "$PR" --repo "$REPO" \
            --body "**🔀 Auto-merge** merged this PR after approval (opt-in label \`$LABEL\`). <sub>— adlc</sub>" || true
          # GITHUB_TOKEN merges don't trigger GitHub's native auto-close, so close
          # them ourselves — but only if still OPEN, so we never double-comment when
          # an App-token merge already triggered the native close.
          for iss in $CLOSES; do
            ISTATE=$(gh issue view "$iss" --repo "$REPO" --json state -q .state 2>/dev/null || echo "")
            if [ "$ISTATE" = "OPEN" ]; then
              echo "closing issue #$iss (resolved by PR #$PR)"
              gh issue close "$iss" --repo "$REPO" --reason completed \
                --comment "**✅ Resolved** by merged PR #$PR. <sub>— adlc</sub>" || true
            else
              echo "issue #$iss already $ISTATE — skipping close."
            fi
          done
