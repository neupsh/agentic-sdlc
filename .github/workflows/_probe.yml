name: _probe (throwaway)
on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - name: Mint
        id: apptoken
        if: steps.never.outputs.x == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADLC_APP_ID }}
          private-key: ${{ secrets.ADLC_APP_PRIVATE_KEY }}
      - name: Use token output alone (no secrets fallback)
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
        run: echo "len=${#GH_TOKEN}"
