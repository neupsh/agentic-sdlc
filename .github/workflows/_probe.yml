name: _probe (throwaway)
on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - name: Detect
        id: appdetect
        env:
          APP_ID: ${{ secrets.ADLC_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Mint
        id: apptoken
        if: steps.appdetect.outputs.present == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADLC_APP_ID }}
          private-key: ${{ secrets.ADLC_APP_PRIVATE_KEY }}
      - name: Resolve token
        env:
          APP_TOKEN: ${{ steps.apptoken.outputs.token }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            printf 'GH_TOKEN=%s\n' "$APP_TOKEN" >> "$GITHUB_ENV"
          else
            printf 'GH_TOKEN=%s\n' "$DEFAULT_TOKEN" >> "$GITHUB_ENV"
          fi
      - name: Checkout (token via env context)
        uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}
      - name: Verify GH_TOKEN inherited + usable
        run: |
          echo "GH_TOKEN length: ${#GH_TOKEN}"
          test -n "$GH_TOKEN" || { echo "GH_TOKEN empty!"; exit 1; }
          gh repo view neupsh/adlc --json name -q .name
