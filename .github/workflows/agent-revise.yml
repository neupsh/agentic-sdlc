name: Agent Revise (Reusable)

# Called by a project's agent-dispatch.yml for two on-demand modes on an existing PR:
#   mode=revise (default): a "Request changes" review or a '/fix' comment -> the coder
#     reads ALL feedback and revises the PR in place (same branch, no new PR).
#   mode=review: a '/review' comment -> runs the inline AI review->fix loop on the PR
#     (reviewer judges the diff, coder fixes, repeat; merges if the auto-merge label is
#     present). This is the on-demand twin of the review loop baked into agent-issue.yml.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      mode:
        description: "revise (apply feedback) or review (run the AI review->fix loop)"
        required: false
        type: string
        default: "revise"
      review_rounds:
        description: Max AI review->fix rounds when mode=review
        required: false
        type: string
        default: "3"
      reviewer_model:
        description: Claude model for the AI reviewer when mode=review
        required: false
        type: string
        default: "claude-sonnet-4-6"
      reviewer_effort:
        description: "Reasoning effort for the AI reviewer (low|medium|high|xhigh|max)"
        required: false
        type: string
        default: "high"
      runner_labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["self-hosted","linux"]'
      build_check_cmd:
        required: false
        type: string
        default: ""
      build_test_cmd:
        required: false
        type: string
        default: ""
      project_conventions:
        required: false
        type: string
        default: ""
      agent_email:
        required: false
        type: string
        default: "agent-coder@agents.bot"
      model:
        required: false
        type: string
        default: "claude-sonnet-4-6"
      effort:
        description: "Reasoning effort for the coding agent (low|medium|high|xhigh|max)"
        required: false
        type: string
        default: "medium"

jobs:
  revise:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    concurrency:
      group: agent-revise-${{ inputs.pr_number }}
      cancel-in-progress: false
    timeout-minutes: 60

    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      REPO: ${{ github.repository }}
      MODEL: ${{ inputs.model }}
      MODE: ${{ inputs.mode }}
      # NB: GH_TOKEN is NOT set here — `secrets` is not available in job-level env:
      # (GitHub rejects the workflow at startup). "Resolve auth token" sets it.

    steps:
      # Optional branded bot identity — see agent-issue.yml for the full rationale.
      # "Resolve auth token" sets GH_TOKEN (app token else GITHUB_TOKEN) via $GITHUB_ENV.
      - name: Detect GitHub App credentials
        id: appdetect
        env:
          APP_ID: ${{ secrets.ADLC_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "adlc: GitHub App configured — bot actions attributed to the app[bot]"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "adlc: no GitHub App secrets — using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Mint GitHub App token
        id: apptoken
        if: steps.appdetect.outputs.present == 'true'
        # Repo-scoped token, TTL ~1h; keep timeout-minutes (60) <= that TTL.
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADLC_APP_ID }}
          private-key: ${{ secrets.ADLC_APP_PRIVATE_KEY }}

      - name: Resolve auth token
        # Sets GH_TOKEN (app token else GITHUB_TOKEN) via $GITHUB_ENV. Each value is
        # its own single-context expression — a steps+secrets mix in one ${{ }} is a
        # startup_failure actionlint won't catch. See agent-issue.yml.
        env:
          APP_TOKEN: ${{ steps.apptoken.outputs.token }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            printf 'GH_TOKEN=%s\n' "$APP_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GitHub App token"
          else
            printf 'GH_TOKEN=%s\n' "$DEFAULT_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Resolve per-runner temp paths
        run: |
          echo "WORKTREE=$RUNNER_TEMP/agent-worktrees/pr-$PR_NUMBER" >> "$GITHUB_ENV"
          echo "PROMPT_FILE=$RUNNER_TEMP/agent-prompt.txt" >> "$GITHUB_ENV"
          echo "RUN_LOG=$RUNNER_TEMP/agent-run.log" >> "$GITHUB_ENV"
          echo "FEEDBACK_FILE=$RUNNER_TEMP/feedback.md" >> "$GITHUB_ENV"

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Resolved by "Resolve auth token": app token (pushes attributed to the app)
          # when configured, else GITHUB_TOKEN.
          token: ${{ env.GH_TOKEN }}

      - name: Checkout adlc scripts
        uses: actions/checkout@v4
        with:
          repository: neupsh/adlc
          path: .adlc
          fetch-depth: 1

      - name: Configure git identity + GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
        run: |
          git config user.name "Agent Coder"
          git config user.email "$AGENT_EMAIL"
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          chmod 700 "$GNUPGHOME"
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Deterministic non-interactive signing: git shells out to this wrapper,
          # which always supplies the passphrase via loopback. So `git commit -S`
          # never needs a tty or a time-limited agent cache — long agent runs were
          # going cold mid-commit, leaving the fix staged but unsigned/unpushed.
          umask 077
          printf '%s' "$GPG_PASSPHRASE" > "$GNUPGHOME/passphrase"
          printf '#!/bin/sh\nexec gpg --batch --no-tty --pinentry-mode loopback --passphrase-file "%s/passphrase" "$@"\n' \
            "$GNUPGHOME" > "$GNUPGHOME/gpg-sign.sh"
          chmod 700 "$GNUPGHOME/gpg-sign.sh"
          git config commit.gpgsign true
          git config user.signingkey "$GPG_KEY_ID"
          git config gpg.program "$GNUPGHOME/gpg-sign.sh"
          # Fail loudly HERE (not mid-agent-run) if signing is misconfigured.
          echo "adlc signing check" | "$GNUPGHOME/gpg-sign.sh" --clearsign > /dev/null

      - name: Record agent provenance on commits
        env:
          AGENT_MODEL: ${{ inputs.model }}
          AGENT_EFFORT: ${{ inputs.effort }}
        run: bash .adlc/scripts/setup-commit-trailers.sh

      - name: Resolve PR branch + gather review feedback
        run: |
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName -q .headRefName)
          echo "PR_BRANCH=$PR_BRANCH" >> "$GITHUB_ENV"
          echo "BRANCH=$PR_BRANCH" >> "$GITHUB_ENV"   # _common.sh reads $BRANCH

          # Issue number from the agent/issue-<n> branch name, else from the PR body.
          ISSUE_NUMBER="${PR_BRANCH##*-}"
          case "$ISSUE_NUMBER" in
            *[!0-9]*|'')
              ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q '.body' \
                | grep -oiE '#[0-9]+' | head -1 | tr -d '#' || echo "") ;;
          esac
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"

          # Collect human feedback only (exclude bot/agent authors): formal reviews,
          # inline review comments, and PR conversation comments.
          {
            gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
              --jq '.[] | select((.body // "") != "" and .user.type != "Bot") | "### Review by @\(.user.login) [\(.state)]\n\(.body)\n"'
            gh api "repos/$REPO/pulls/$PR_NUMBER/comments" --paginate \
              --jq '.[] | select(.user.type != "Bot") | "### Inline @\(.user.login) (\(.path):\(.line // .original_line // 0))\n\(.body)\n"'
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
              --jq '.[] | select(.user.type != "Bot") | "### Comment by @\(.user.login)\n\(.body)\n"'
          } > "$FEEDBACK_FILE" 2>/dev/null || true
          echo "Gathered $(wc -l < "$FEEDBACK_FILE") lines of feedback for PR #$PR_NUMBER (issue #$ISSUE_NUMBER, branch $PR_BRANCH)"

      - name: Create worktree from the PR branch
        run: |
          mkdir -p "$(dirname "$WORKTREE")"
          git fetch origin "+refs/heads/$PR_BRANCH:refs/remotes/origin/$PR_BRANCH"
          git worktree remove "$WORKTREE" --force 2>/dev/null || true
          git worktree prune
          git branch -D "$PR_BRANCH" 2>/dev/null || true
          git worktree add -B "$PR_BRANCH" "$WORKTREE" "origin/$PR_BRANCH"

      - name: Note start
        run: |
          if [ "$MODE" = review ]; then
            MSG="**🔍 Reviewer** is reviewing this PR (\`$PR_BRANCH\`) — model \`${{ inputs.reviewer_model }}\` · effort \`${{ inputs.reviewer_effort }}\`, up to ${{ inputs.review_rounds }} round(s)"
          else
            MSG="**🛠 Coder** is addressing review feedback on \`$PR_BRANCH\` — model \`$MODEL\` · effort \`${{ inputs.effort }}\`"
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "$MSG · $(date -u '+%Y-%m-%d %H:%M UTC') <sub>— adlc</sub>" || true

      - name: Build revise prompt
        if: ${{ inputs.mode != 'review' }}
        env:
          ISSUE_TYPE: revise
          AGENT_EMAIL: ${{ inputs.agent_email }}
          CONVENTIONS: ${{ inputs.project_conventions }}
          BUILD_CHECK: ${{ inputs.build_check_cmd }}
          BUILD_TEST: ${{ inputs.build_test_cmd }}
        run: |
          set -o pipefail
          bash .adlc/scripts/build-prompt.sh 2>&1 | tee "$RUN_LOG"

      - name: Run agent (revise)
        if: ${{ inputs.mode != 'review' }}
        env:
          GPG_TTY: /dev/tty
          EFFORT: ${{ inputs.effort }}
        working-directory: ${{ env.WORKTREE }}
        run: |
          claude -p "$(cat "$PROMPT_FILE")" \
            --model "$MODEL" \
            --effort "$EFFORT" \
            --dangerously-skip-permissions \
            2>&1 | tee "$RUN_LOG"

      - name: AI review loop (on demand)
        if: ${{ inputs.mode == 'review' }}
        env:
          GPG_TTY: /dev/tty
          REVIEW_ROUNDS: ${{ inputs.review_rounds }}
          REVIEWER_MODEL: ${{ inputs.reviewer_model }}
          REVIEWER_EFFORT: ${{ inputs.reviewer_effort }}
          EFFORT: ${{ inputs.effort }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
          CONVENTIONS: ${{ inputs.project_conventions }}
          BUILD_CHECK: ${{ inputs.build_check_cmd }}
          BUILD_TEST: ${{ inputs.build_test_cmd }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ADLC_DIR: ${{ github.workspace }}/.adlc/scripts
        working-directory: ${{ env.WORKTREE }}
        run: bash "$ADLC_DIR/review-loop.sh" 2>&1 | tee -a "$RUN_LOG"

      - name: Report failure
        if: failure()
        run: |
          TAIL=$(tail -30 "$RUN_LOG" 2>/dev/null || echo "no log")
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "**🛠 Coder** revise run failed -- see logs. Last output: $TAIL <sub>— adlc</sub>" || true

      - name: Cleanup worktree
        if: always()
        run: git worktree remove "$WORKTREE" --force 2>/dev/null || true
