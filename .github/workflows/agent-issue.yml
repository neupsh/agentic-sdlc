name: Agent Issue (Reusable)

# Called by each project's agent-dispatch.yml on: issues: labeled.
# The caller must set permissions: contents/issues/pull-requests: write.

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      runner_labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["self-hosted","linux"]'
      build_check_cmd:
        description: Command to verify zero warnings/errors
        required: false
        type: string
        default: ""
      build_test_cmd:
        description: Command to run tests
        required: false
        type: string
        default: ""
      project_conventions:
        description: Project-specific conventions injected into the agent prompt
        required: false
        type: string
        default: ""
      agent_email:
        description: Email identity for agent git commits
        required: false
        type: string
        default: "agent-coder@agents.bot"
      model:
        description: Claude model for the coding agent (e.g. claude-sonnet-4-6, claude-opus-4-8)
        required: false
        type: string
        default: "claude-sonnet-4-6"
      effort:
        description: "Reasoning effort for the coding agent (low|medium|high|xhigh|max)"
        required: false
        type: string
        default: "medium"
      review_rounds:
        description: Max inline AI review↔fix rounds (0 disables the AI reviewer)
        required: false
        type: string
        default: "3"
      reviewer_model:
        description: Claude model for the AI reviewer
        required: false
        type: string
        default: "claude-sonnet-4-6"
      reviewer_effort:
        description: "Reasoning effort for the AI reviewer (low|medium|high|xhigh|max)"
        required: false
        type: string
        default: "high"

jobs:
  run-agent:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    # Per-issue mutual exclusion: the same issue never runs twice at once.
    # Machine-wide concurrency (how many issues run in parallel) is capped by
    # the number of self-hosted runner instances registered on the box — see
    # install.sh --runners. GitHub queues jobs when all runners are busy, so
    # excess tickets wait rather than being dropped.
    concurrency:
      group: agent-issue-${{ inputs.issue_number }}
      cancel-in-progress: false
    timeout-minutes: 60

    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
      BRANCH: agent/issue-${{ inputs.issue_number }}
      REPO: ${{ github.repository }}
      MODEL: ${{ inputs.model }}
      # NB: GH_TOKEN is NOT set here — the `secrets` context is not available in a
      # job-level env: block (GitHub rejects the whole workflow at startup). The
      # "Resolve auth token" step sets GH_TOKEN via $GITHUB_ENV for every later step.
      # WORKTREE / PROMPT_FILE / RUN_LOG are derived from RUNNER_TEMP in the first
      # step below. They can't live here: the `runner` context is not available in
      # a job-level env: block (only inside steps), and using it makes GitHub
      # reject the whole workflow file.

    steps:
      # ── Optional branded bot identity ──────────────────────────────────────
      # If ADLC_APP_ID / ADLC_APP_PRIVATE_KEY are set, every bot action (push, PR,
      # comments, merge) is attributed to YOUR GitHub App instead of
      # github-actions[bot]. Absent those secrets, "Resolve auth token" falls back to
      # GITHUB_TOKEN — identical to before. App-authored events can also trigger
      # other workflows (GITHUB_TOKEN's can't), so the dispatcher excludes Bot actors
      # to avoid the inline reviewer's comments looping back. (`secrets` isn't usable
      # in `if:`, so a detect step converts its presence into an output that gates
      # the mint step.)
      - name: Detect GitHub App credentials
        id: appdetect
        env:
          APP_ID: ${{ secrets.ADLC_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "adlc: GitHub App configured — bot actions attributed to the app[bot]"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "adlc: no GitHub App secrets — using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Mint GitHub App token
        id: apptoken
        if: steps.appdetect.outputs.present == 'true'
        # Repo-scoped installation token, TTL ~1h. timeout-minutes (60) must stay
        # <= that TTL, else the token can expire mid-run and the final push/merge
        # fails after all the work is done.
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ADLC_APP_ID }}
          private-key: ${{ secrets.ADLC_APP_PRIVATE_KEY }}

      - name: Resolve auth token
        # Sets GH_TOKEN for every later step (and checkout) via $GITHUB_ENV: the app
        # token when configured, else GITHUB_TOKEN. APP_TOKEN and DEFAULT_TOKEN are
        # each their OWN single-context expression — GitHub rejects a steps+secrets
        # mix in one ${{ }} with startup_failure (actionlint does not catch it), so
        # never write `${{ steps.x.outputs.y || secrets.Z }}`.
        env:
          APP_TOKEN: ${{ steps.apptoken.outputs.token }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            printf 'GH_TOKEN=%s\n' "$APP_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GitHub App token"
          else
            printf 'GH_TOKEN=%s\n' "$DEFAULT_TOKEN" >> "$GITHUB_ENV"
            echo "adlc: using GITHUB_TOKEN (github-actions[bot])"
          fi

      - name: Resolve per-runner temp paths
        # RUNNER_TEMP is unique per runner instance and wiped each job, so the
        # worktree, prompt file, and run log of concurrent jobs — even across repos
        # sharing a machine — can never collide on shared /tmp.
        run: |
          echo "WORKTREE=$RUNNER_TEMP/agent-worktrees/$ISSUE_NUMBER" >> "$GITHUB_ENV"
          echo "PROMPT_FILE=$RUNNER_TEMP/agent-prompt.txt" >> "$GITHUB_ENV"
          echo "RUN_LOG=$RUNNER_TEMP/agent-run.log" >> "$GITHUB_ENV"

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Resolved by "Resolve auth token": app token (pushes attributed to the app)
          # when configured, else GITHUB_TOKEN.
          token: ${{ env.GH_TOKEN }}

      - name: Checkout adlc scripts
        uses: actions/checkout@v4
        with:
          repository: neupsh/adlc
          path: .adlc
          fetch-depth: 1

      - name: Configure git identity + GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
        run: |
          git config user.name "Agent Coder"
          git config user.email "$AGENT_EMAIL"
          # Use an isolated GNUPGHOME so we don't touch the user's gpg-agent
          # (reloadagent on the user's agent would clear their passphrase cache)
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          chmod 700 "$GNUPGHOME"
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Deterministic non-interactive signing: git shells out to this wrapper,
          # which always supplies the passphrase via loopback. So `git commit -S`
          # never needs a tty or a time-limited agent cache — long agent runs were
          # going cold mid-commit, leaving the fix staged but unsigned/unpushed.
          umask 077
          printf '%s' "$GPG_PASSPHRASE" > "$GNUPGHOME/passphrase"
          printf '#!/bin/sh\nexec gpg --batch --no-tty --pinentry-mode loopback --passphrase-file "%s/passphrase" "$@"\n' \
            "$GNUPGHOME" > "$GNUPGHOME/gpg-sign.sh"
          chmod 700 "$GNUPGHOME/gpg-sign.sh"
          git config commit.gpgsign true
          git config user.signingkey "$GPG_KEY_ID"
          git config gpg.program "$GNUPGHOME/gpg-sign.sh"
          # Fail loudly HERE (not mid-agent-run) if signing is misconfigured.
          echo "adlc signing check" | "$GNUPGHOME/gpg-sign.sh" --clearsign > /dev/null

      - name: Create worktree
        run: |
          # Fully idempotent so a same-issue re-run (after a crash/cancel) on a
          # runner that still holds stale worktree metadata or the local branch
          # starts clean. RUNNER_TEMP is wiped between jobs but the persistent
          # _work checkout keeps .git/worktrees/* and the agent/issue-<n> branch.
          mkdir -p "$(dirname "$WORKTREE")"
          git worktree remove "$WORKTREE" --force 2>/dev/null || true
          git worktree prune
          git branch -D "$BRANCH" 2>/dev/null || true
          # Sync the remote-tracking ref if a prior run already pushed this
          # branch (crash/cancel after push). The fresh branch starts from HEAD,
          # so the agent's push diverges from origin; updating the tracking ref
          # lets its `git push --force-with-lease` safely overwrite it.
          git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH" 2>/dev/null || true
          git worktree add "$WORKTREE" -b "$BRANCH" HEAD

      - name: Resolve issue type and model
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '[.labels[].name] | join(" ")' --repo "$REPO")

          # Determine ISSUE_TYPE
          if echo "$LABELS" | grep -qw "type:initiative"; then
            ISSUE_TYPE=initiative
            TYPE_MODEL=claude-opus-4-8
          elif echo "$LABELS" | grep -qw "type:epic"; then
            ISSUE_TYPE=epic
            TYPE_MODEL=claude-opus-4-8
          elif echo "$LABELS" | grep -qw "type:bug"; then
            ISSUE_TYPE=bug
            TYPE_MODEL="$MODEL"
          else
            ISSUE_TYPE=story
            TYPE_MODEL="$MODEL"
          fi

          # Determine EFFECTIVE_MODEL (model label overrides type default)
          if echo "$LABELS" | grep -qw "model:opus"; then
            EFFECTIVE_MODEL=claude-opus-4-8
          elif echo "$LABELS" | grep -qw "model:sonnet"; then
            EFFECTIVE_MODEL=claude-sonnet-4-6
          else
            EFFECTIVE_MODEL="$TYPE_MODEL"
          fi

          echo "ISSUE_TYPE=$ISSUE_TYPE" >> "$GITHUB_ENV"
          echo "MODEL=$EFFECTIVE_MODEL" >> "$GITHUB_ENV"
          echo "Resolved: type=$ISSUE_TYPE model=$EFFECTIVE_MODEL"

      - name: Record agent provenance on commits
        env:
          AGENT_MODEL: ${{ env.MODEL }}
          AGENT_EFFORT: ${{ inputs.effort }}
        run: bash .adlc/scripts/setup-commit-trailers.sh

      - name: Mark issue in-progress
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "agent-ready" \
            --add-label "agent-coding" \
            --repo "$REPO"
          gh issue comment "$ISSUE_NUMBER" \
            --body "**🛠 Coder** started on \`$BRANCH\` — $(date -u '+%Y-%m-%d %H:%M UTC') · type \`$ISSUE_TYPE\` · model \`$MODEL\` · effort \`${{ inputs.effort }}\` <sub>— adlc</sub>" \
            --repo "$REPO"

      - name: Fetch full issue body
        id: issue
        run: |
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' --repo "$REPO")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build agent prompt
        env:
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          BUILD_CHECK: ${{ inputs.build_check_cmd }}
          BUILD_TEST: ${{ inputs.build_test_cmd }}
          CONVENTIONS: ${{ inputs.project_conventions }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
          ISSUE_TYPE: ${{ env.ISSUE_TYPE }}
        # Capture stdout+stderr to RUN_LOG so a prompt-builder failure shows up in
        # the "Agent Coder failed" issue comment instead of "no log". pipefail
        # makes the step exit non-zero if build-prompt.sh fails despite the tee.
        run: |
          set -o pipefail
          bash .adlc/scripts/build-prompt.sh 2>&1 | tee "$RUN_LOG"

      - name: Run agent
        env:
          GPG_TTY: /dev/tty
          EFFORT: ${{ inputs.effort }}
        working-directory: ${{ env.WORKTREE }}
        run: |
          claude -p "$(cat "$PROMPT_FILE")" \
            --model "$MODEL" \
            --effort "$EFFORT" \
            --dangerously-skip-permissions \
            2>&1 | tee "$RUN_LOG"

      - name: AI review loop
        # Inline (same job) because a GITHUB_TOKEN-authored review/push can't trigger
        # another workflow. No-ops if the coder opened no PR or review_rounds == 0.
        if: ${{ inputs.review_rounds != '0' }}
        env:
          GPG_TTY: /dev/tty
          REVIEW_ROUNDS: ${{ inputs.review_rounds }}
          REVIEWER_MODEL: ${{ inputs.reviewer_model }}
          REVIEWER_EFFORT: ${{ inputs.reviewer_effort }}
          EFFORT: ${{ inputs.effort }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
          CONVENTIONS: ${{ inputs.project_conventions }}
          BUILD_CHECK: ${{ inputs.build_check_cmd }}
          BUILD_TEST: ${{ inputs.build_test_cmd }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ADLC_DIR: ${{ github.workspace }}/.adlc/scripts
        working-directory: ${{ env.WORKTREE }}
        run: bash "$ADLC_DIR/review-loop.sh" 2>&1 | tee -a "$RUN_LOG"

      - name: Post result to issue
        if: always()
        run: |
          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url' \
            --repo "$REPO" 2>/dev/null || echo "")
          ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --json state -q '.state' \
            --repo "$REPO" 2>/dev/null || echo "")
          CURRENT_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels \
            -q '[.labels[].name] | join(",")' --repo "$REPO" 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "agent-coding" --add-label "agent-review" \
              --repo "$REPO" 2>/dev/null || true
            gh issue comment "$ISSUE_NUMBER" \
              --body "**🛠 Coder** finished · model \`$MODEL\` — PR: $PR_URL <sub>— adlc</sub>" \
              --repo "$REPO"
            # Carry opt-in auto-merge from the issue onto the PR so an approving
            # review can merge it (see agent-automerge.yml). Default stays manual.
            if echo "$CURRENT_LABELS" | grep -qw "auto-merge"; then
              PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' \
                --repo "$REPO" 2>/dev/null || echo "")
              [ -n "$PR_NUM" ] && gh pr edit "$PR_NUM" --add-label "auto-merge" \
                --repo "$REPO" 2>/dev/null || true
            fi
          elif echo "$CURRENT_LABELS" | grep -q "agent-review" || [ "$ISSUE_STATE" = "CLOSED" ]; then
            # Agent determined no change needed (self-labeled agent-review or closed the issue directly)
            if [ "$ISSUE_STATE" != "CLOSED" ]; then
              gh issue close "$ISSUE_NUMBER" \
                --comment "Closing — agent confirmed no code change required." \
                --repo "$REPO" 2>/dev/null || true
            fi
          else
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "agent-coding" --add-label "agent-failed" \
              --repo "$REPO" 2>/dev/null || true
            TAIL=$(tail -30 "$RUN_LOG" 2>/dev/null || echo "no log")
            gh issue comment "$ISSUE_NUMBER" \
              --body "**🛠 Coder** failed -- no PR opened. Last output: $TAIL <sub>— adlc</sub>" \
              --repo "$REPO"
          fi

      - name: Cleanup worktree
        if: always()
        run: |
          git worktree remove "$WORKTREE" --force 2>/dev/null || true
