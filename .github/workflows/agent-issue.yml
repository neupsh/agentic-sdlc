name: Agent Issue (Reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      runner_labels:
        description: 'JSON array of runner labels, e.g. ["self-hosted","linux","ibkr"]'
        required: false
        type: string
        default: '["self-hosted","linux"]'
      build_check_cmd:
        description: "Command to verify 0 warnings/errors (run inside worktree)"
        required: false
        type: string
        default: ""
      build_test_cmd:
        description: "Command to run tests (run inside worktree)"
        required: false
        type: string
        default: ""
      project_conventions:
        description: "Project-specific conventions injected into the agent prompt"
        required: false
        type: string
        default: ""
      agent_email:
        description: "Email identity for agent git commits"
        required: false
        type: string
        default: "agent-coder@agents.bot"

jobs:
  run-agent:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    concurrency:
      group: agent-issue-${{ inputs.issue_number }}
      cancel-in-progress: false
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
      BRANCH: agent/issue-${{ inputs.issue_number }}
      WORKTREE: /tmp/agent-worktrees/${{ inputs.issue_number }}
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity + GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
        run: |
          git config user.name "Agent Coder"
          git config user.email "$AGENT_EMAIL"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          git config commit.gpgsign true
          git config user.signingkey "$GPG_KEY_ID"
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          grep -qxF 'allow-loopback-pinentry' ~/.gnupg/gpg-agent.conf 2>/dev/null \
            || echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye 2>/dev/null || true
          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --pinentry-mode loopback --passphrase-fd 0 \
            --sign /dev/null 2>/dev/null || true

      - name: Create worktree
        run: |
          mkdir -p /tmp/agent-worktrees
          if git worktree list | grep -q "$WORKTREE"; then
            git worktree remove "$WORKTREE" --force
          fi
          git worktree add "$WORKTREE" -b "$BRANCH" HEAD

      - name: Mark issue in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "agent-ready" \
            --add-label "agent-coding" \
            --repo "$REPO"
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 **Agent Coder** started on \`$BRANCH\` — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --repo "$REPO"

      - name: Fetch full issue body
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' --repo "$REPO")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build agent prompt
        id: prompt
        env:
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          BUILD_CHECK: ${{ inputs.build_check_cmd }}
          BUILD_TEST: ${{ inputs.build_test_cmd }}
          CONVENTIONS: ${{ inputs.project_conventions }}
          AGENT_EMAIL: ${{ inputs.agent_email }}
        run: |
          cat > /tmp/agent-prompt.txt << 'PROMPT_EOF'
          You are an autonomous coding agent fixing a GitHub issue in the repository at the current working directory.

          ## Identity
          - You are Agent Coder for issue #ISSUE_NUM
          - Branch: BRANCH_NAME
          - Working directory: this worktree (already checked out on BRANCH_NAME)
          - Git commit identity: "Agent Coder <AGENT_EMAIL_VAL>"

          ## Universal conventions (non-negotiable)
          - Sign every commit: `git commit -S`
          - No co-author lines, no "Generated by Claude" or "Claude Code" in commit or PR body
          - Never touch .env or credential files
          - Conventional commits: `<type>(<scope>): <description>`
          - 0 warnings, 0 errors from the build check command before committing

          PROMPT_EOF

          # Replace placeholders
          sed -i "s|ISSUE_NUM|$ISSUE_NUMBER|g; s|BRANCH_NAME|$BRANCH|g; s|AGENT_EMAIL_VAL|$AGENT_EMAIL|g" \
            /tmp/agent-prompt.txt

          # Inject project-specific conventions
          if [ -n "$CONVENTIONS" ]; then
            printf '\n## Project conventions\n\n%s\n' "$CONVENTIONS" >> /tmp/agent-prompt.txt
          elif [ -f ".agentic/conventions.md" ]; then
            printf '\n## Project conventions\n\n' >> /tmp/agent-prompt.txt
            cat .agentic/conventions.md >> /tmp/agent-prompt.txt
          fi

          # Inject build commands
          printf '\n## Build commands\n' >> /tmp/agent-prompt.txt
          if [ -n "$BUILD_CHECK" ]; then
            printf 'Check: `%s`\n' "$BUILD_CHECK" >> /tmp/agent-prompt.txt
          fi
          if [ -n "$BUILD_TEST" ]; then
            printf 'Test:  `%s`\n' "$BUILD_TEST" >> /tmp/agent-prompt.txt
          fi
          if [ -f ".agentic/build.sh" ]; then
            printf '\nOr run `.agentic/build.sh check` / `.agentic/build.sh test`\n' >> /tmp/agent-prompt.txt
          fi

          # Task instructions
          cat >> /tmp/agent-prompt.txt << 'TASK_EOF'

          ## Your task
          1. Read the issue body below and understand the problem fully before touching any file
          2. Make the minimal correct fix — no refactoring beyond what the issue requires
          3. Run the build check command (0 warnings) then the test command
          4. Commit: `git commit -S -m '<type>(<scope>): <description>'`
          5. Push: `git push origin BRANCH_PLACEHOLDER`
          6. Open PR against main:
             ```
             gh pr create --title '<same as commit>' --body 'Fixes #ISSUE_PLACEHOLDER.

             ## Summary
             ...

             ## Test plan
             - [ ] build check: 0 warnings ✓
             - [ ] tests: N passed ✓'
             ```
          7. Update issue label: `gh issue edit ISSUE_PLACEHOLDER --remove-label agent-coding --add-label agent-review`

          If you hit an ambiguity that blocks you, post a comment on the issue explaining what's unclear, then stop.
          TASK_EOF

          sed -i "s|BRANCH_PLACEHOLDER|$BRANCH|g; s|ISSUE_PLACEHOLDER|$ISSUE_NUMBER|g" \
            /tmp/agent-prompt.txt

          # Append issue body
          printf '\n## Issue Body\n\n%s\n' "$ISSUE_BODY" >> /tmp/agent-prompt.txt

      - name: Run agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_TTY: /dev/tty
        working-directory: ${{ env.WORKTREE }}
        run: |
          claude -p "$(cat /tmp/agent-prompt.txt)" \
            --dangerously-skip-permissions \
            2>&1 | tee /tmp/agent-run-$ISSUE_NUMBER.log

      - name: Post result to issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url' \
            --repo "$REPO" 2>/dev/null || echo "")
          CURRENT_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels \
            -q '[.labels[].name] | join(",")' --repo "$REPO" 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "agent-coding" --add-label "agent-review" \
              --repo "$REPO" 2>/dev/null || true
            gh issue comment "$ISSUE_NUMBER" \
              --body "🤖 **Agent Coder** finished — PR opened: $PR_URL" \
              --repo "$REPO"
          elif echo "$CURRENT_LABELS" | grep -q "agent-review"; then
            : # agent self-transitioned (no code change needed)
          else
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "agent-coding" --add-label "agent-failed" \
              --repo "$REPO" 2>/dev/null || true
            TAIL=$(tail -30 /tmp/agent-run-$ISSUE_NUMBER.log 2>/dev/null || echo "no log")
            gh issue comment "$ISSUE_NUMBER" \
              --body "$(printf '🤖 **Agent Coder** failed — no PR opened. Last output:\n```\n%s\n```' "$TAIL")" \
              --repo "$REPO"
          fi

      - name: Cleanup worktree
        if: always()
        run: |
          git worktree remove "$WORKTREE" --force 2>/dev/null || true
