name: Agent Issue (Reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      runner_labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["self-hosted","linux"]'
      build_check_cmd:
        description: Command to verify zero warnings/errors
        required: false
        type: string
        default: ""
      build_test_cmd:
        description: Command to run tests
        required: false
        type: string
        default: ""
      project_conventions:
        description: Project-specific conventions
        required: false
        type: string
        default: ""
      agent_email:
        description: Email identity for agent git commits
        required: false
        type: string
        default: "agent-coder@agents.bot"

jobs:
  run-agent:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
      BRANCH: agent/issue-${{ inputs.issue_number }}
      WORKTREE: /tmp/agent-worktrees/${{ inputs.issue_number }}
      REPO: ${{ github.repository }}
    steps:
      - run: echo "Issue ${{ inputs.issue_number }} - ${{ inputs.issue_title }}"
