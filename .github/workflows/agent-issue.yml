name: Agent Issue (Reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      runner_labels:
        required: false
        type: string
        default: '["self-hosted","linux"]'

jobs:
  run-agent:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    steps:
      - run: echo "Issue ${{ inputs.issue_number }} - ${{ inputs.issue_title }}"
